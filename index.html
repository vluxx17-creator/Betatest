<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>BoNEW Mini App</title>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #ffffff);
      --text: var(--tg-theme-text-color, #000000);
      --hint: var(--tg-theme-hint-color, #999999);
      --btn: var(--tg-theme-button-color, #248bcf);
      --btn-text: var(--tg-theme-button-text-color, #ffffff);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    h2 { margin-bottom: 20px; }

    input {
      width: 100%;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 12px;
      border: 1px solid var(--hint);
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 15px;
      background-color: var(--btn);
      color: var(--btn-text);
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Поиск BoNEW</h2>
    <input type="text" id="searchQuery" placeholder="Что ищем?">
    <button id="mainBtn">Отправить боту</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const btn = document.getElementById("mainBtn");
    const input = document.getElementById("searchQuery");

    btn.addEventListener("click", () => {
      const val = input.value.trim();
      if (val.length > 0) {
        // This sends data back to the bot and closes the app
tg.sendData(val);
      } else {
        tg.showAlert("Пожалуйста, введите запрос!");
      }
    });

    // Set MainButton (Optional, Telegram style)
    tg.MainButton.setText("ЗАКРЫТЬ").show().onClick(() => {
      tg.close();
    });
  </script>
</body>
</html>
